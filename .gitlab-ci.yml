#   needs: [package]
#   rules:
#     - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
#       when: manual
#   script:
#     - .\scripts\ci\deploy-staging.ps1 -PackagePath "artifact\EAM.Api-$env:CI_COMMIT_SHORT_SHA.zip"
#   environment:
#     name: staging
#     url: $STAGING_BASE_URL

# # ── Nightly integration run (optional) ──────────────────────────────────────
# # Create a Pipeline Schedule (CI/CD → Schedules) to exercise integration tests
# # every night; the integration_tests rule above already allows `schedule`.
